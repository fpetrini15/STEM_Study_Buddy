<!DOCTYPE html>

<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-T3NE3G0PNN"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-T3NE3G0PNN");
    </script>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Interactive STEM quizzes with practice, study, and exam modes. Get instant feedback and explanations as you learn."
    />

    <title id="tabTitle">Quiz</title>

    <link id="favicon" rel="icon" type="image/svg+xml" />

    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body data-page="quiz">
    <div class="container">
      <div id="loading-screen">
        <div class="science-loader">
          <div class="loader-ring"></div>

          <div class="science-emoji">🧪</div>
        </div>

        <p class="loading-text">Preparing quiz...</p>
      </div>

      <div id="quiz-error" class="load-error hidden">
        <h2>Couldn't load quiz</h2>
        <p id="quiz-error-message"></p>
        <a id="quiz-error-back" class="btn btn-small nav-link">Back to subject</a>
      </div>

      <div id="mode-screen" class="mode-screen hidden">
        <h2>Choose a mode</h2>

        <p class="mode-intro">Pick how you want to study this quiz.</p>

        <div class="mode-options">
          <button class="mode-card" data-mode="practice">
            <strong>Practice</strong>
            <span>Immediate feedback, explanations, and skip.</span>
          </button>

          <button class="mode-card" data-mode="study">
            <strong>Study</strong>
            <span>Same feedback without score tracking.</span>
          </button>

          <button class="mode-card" data-mode="exam">
            <strong>Exam</strong>
            <span>No hints or skip — results at the end.</span>
          </button>
        </div>
      </div>

      <div id="quiz-content" class="hidden">
        <h1 id="quizHeader">Quiz</h1>

        <p id="mode-badge" class="mode-badge hidden"></p>

        <p id="question-progress" class="question-progress"></p>

        <div class="progress-container">
          <div id="progress-bar"></div>
        </div>

        <div class="instruction-container">
          <div id="instruction-text"></div>
        </div>

        <div class="question-area">
          <div id="prompt-container">
            <div id="prompt"></div>
          </div>

          <div id="interaction-area">
            <div id="draggable" class="answer" draggable="false"></div>
          </div>
        </div>

        <div id="categories" class="categories"></div>

        <div id="feedback" aria-live="polite" aria-atomic="true"></div>

        <div class="score">
          Score:
          <span id="score">0</span>
          /
          <span id="total">0</span>
        </div>

        <button id="continue-btn" class="btn btn-small" style="display: none">
          Continue
        </button>

        <button id="skip-btn" class="btn btn-small" style="display: none">
          Skip
        </button>

        <div id="final-screen" style="display: none">
          <h2 id="final-heading" tabindex="-1">Quiz Complete!</h2>

          <p id="final-tier" class="final-tier"></p>

          <p id="final-score" class="final-score-display"></p>

          <p id="final-detail" class="final-detail"></p>

          <p id="final-hint" class="final-hint hidden"></p>

          <div class="final-actions">
            <button
              id="review-wrong-btn"
              class="btn btn-small btn-emphasis"
              style="display: none"
            >
              Review Wrong
            </button>

            <button
              id="review-skipped-btn"
              class="btn btn-small"
              style="display: none"
            >
              Review Skipped
            </button>

            <button id="retry-btn" class="btn btn-small">Retry Quiz</button>
          </div>
        </div>

        <footer>
          <p>STEM Study Buddy</p>
        </footer>
      </div>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/stem-text.js"></script>
    <script src="js/quiz.js" defer></script>
  </body>
</html>
